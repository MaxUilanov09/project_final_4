<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Document</title>
    <link rel="stylesheet" href="./src/css/main.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">FIND BEST EVENTS AROUND THE WORLD</h1>
        <div class="header__inputs">
            <div class="header__input__wrap">
                <input type="text" class="input__query" data-query="" placeholder="Start searching">
                <img class="input__icon__search" src="./src/images/search_icon.svg">
            </div>
            <div class="header__input__wrap dropdown">
                <input type="text" class="input__country" data-code="-1" placeholder="Choose country">
                <img class="input__icon__dropdown" src="./src/images/dropdown_icon.svg">
                <div class="dropdown__content"></div>
            </div>
        </div>
    </header>
    <main class="main">
        <ul class="event__card__list"></ul>

        <section class="main-modal">
            <div class="modal-overlay" id="modal">
                <div class="modal-content">
                    <button type="button" class="modal-close">×</button>

                    <div class="modal-body">
                        <img id="modal-image" src="#" alt="event image" />

                        <div class="modal-info">
                            <h2 id="modal-title"></h2>

                            <p id="modal-date"></p>

                            <p id="modal-description"></p>

                            <a id="modal-link" target="_blank"> BUY TICKETS </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">
        <div class="pagination__pages"></div>
        <p class="copyright__text">© 2021 | All Rights Reserved | Developed with ♥ by GoIT Students</p>
    </footer>
    <script type="module" src="./src/js/script.js"></script>
</body>
</html>
